<div class="text-center p-4">
  <h1 class="text-2xl">FF! Doc JSON Library Playground</h1>
</div>
<div class="p-4">
  <h2 class="text-2xl">Elements</h2>
  @for (element of elements() | keyvalue; track element.key) {
    <section class="py-2">
      <h3 class="text-lg">{{ element.key }}</h3>
      <p *fdJavadocTransform="let text of element.value.description; elements: elements()" [innerHTML]="text"></p>
    </section>
  }
</div>
